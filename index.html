<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaStar & THV | Premium Indomie</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --primary: #ff2d75;
            --accent: #00d4ff;
            --bg: #0a0a0c;
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* Ambient Glow Background */
        .glow {
            position: fixed;
            width: 40vw; height: 40vw;
            background: radial-gradient(circle, rgba(255, 45, 117, 0.1) 0%, transparent 70%);
            top: -10%; right: -10%; z-index: -1;
        }

        .main-card {
            width: 90%;
            max-width: 480px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            position: relative;
            z-index: 10;
        }

        header { text-align: center; margin-bottom: 35px; }
        header h1 { 
            font-weight: 800; 
            font-size: 2.2rem; 
            background: linear-gradient(to right, #ff2d75, #ff6b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        header p { opacity: 0.5; font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; }

        .form-group { margin-bottom: 22px; }
        label { display: block; font-size: 0.75rem; font-weight: 700; margin-bottom: 10px; opacity: 0.6; text-transform: uppercase; }

        input, select {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px;
            color: #fff;
            font-family: inherit;
            transition: 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-order {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 30px rgba(255, 45, 117, 0.3);
        }

        .btn-order:hover { transform: translateY(-3px); background: #ff4d8d; }
        .btn-order:active { transform: scale(0.96); }

        #status { text-align: center; margin-top: 20px; font-weight: 600; color: var(--primary); min-height: 24px; }

        /* Staff Portal View */
        #staffView {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 1000;
            padding: 40px;
            overflow-y: auto;
        }

        .order-grid {
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            margin-top: 30px;
        }

        .order-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            padding: 25px;
            border-radius: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .done-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
        }

        .admin-trigger {
            position: absolute;
            bottom: 20px;
            right: 20px;
            opacity: 0.1;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="main-card animate__animated animate__fadeIn">
        <header>
            <h1>AQUASTAR & THV</h1>
            <p>Premium Indomie Kitchen</p>
        </header>

        <div class="form-group">
            <label>Customer Identity</label>
            <input type="text" id="custName" placeholder="Enter your name">
        </div>

        <div class="form-group">
            <label>Menu Selection</label>
            <select id="dishSelect">
                <option value="" disabled selected>Choose a masterpiece...</option>
                <optgroup label="PINK SERIES 🌸">
                    <option value="Swicy">Swicy</option>
                    <option value="Duck Duck Indomie">Duck Duck Indomie</option>
                    <option value="The Dreamy Creamy">The Dreamy Creamy</option>
                </optgroup>
                <optgroup label="NUCLEAR SERIES ☢️">
                    <option value="The Atomic Bomb">The Atomic Bomb</option>
                    <option value="The Challenger">The Challenger</option>
                </optgroup>
                <optgroup label="VOID & SPECIALS ⚫">
                    <option value="Duck Duck Black">Duck Duck Black</option>
                    <option value="More Spicy than Swicy">More Spicy than Swicy</option>
                    <option value="The KAI">The KAI</option>
                    <option value="The ZANE">The ZANE</option>
                </optgroup>
            </select>
        </div>

        <div class="form-group">
            <label>Special Instructions</label>
            <input type="text" id="custNote" placeholder="Any requests?">
        </div>

        <button class="btn-order" onclick="sendOrder()">PLACE ORDER</button>
        <div id="status"></div>

        <div class="admin-trigger" onclick="showLogin()">⚙️</div>
    </div>

    <div id="staffView">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1>Incoming Orders</h1>
            <button onclick="document.getElementById('staffView').style.display='none'" class="done-btn">Back</button>
        </div>
        <div id="orderMonitor" class="order-grid"></div>
    </div>

    <script>
        // CORE CONFIG
        const SUPABASE_URL = 'https://bfykhlcqukfhgpfdwywg.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmeWtobGNxdWtmaGdwZmR3eXdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NzIzMTgsImV4cCI6MjA5MzA0ODMxOH0.TWQjUNxTdXkHzYYuLoPJ2txzIDb8w_p_N2lX9qDf_JE';
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1499047536986558497/FS_bssmM8WlvdV9GZanThEfQMC8NhfYF1wxH0Au17VeDb43RxYHPCPGFS0jcuO0iXfFZ";

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function sendOrder() {
            const name = document.getElementById('custName').value;
            const item = document.getElementById('dishSelect').value;
            const note = document.getElementById('custNote').value;
            const status = document.getElementById('status');

            if(!name || !item) return alert("Identify yourself and pick a dish!");
            status.innerText = "Transmitting to kitchen...";

            try {
                // 1. Send to Discord
                const discordRes = await fetch(`${WEBHOOK_URL}?wait=true`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        embeds: [{
                            title: "New Order Confirmed",
                            color: 0xff2d75,
                            fields: [
                                { name: "Customer", value: name, inline: true },
                                { name: "Order", value: item, inline: true },
                                { name: "Note", value: note || "No special requests" }
                            ],
                            timestamp: new Date()
                        }]
                    })
                });
                const discordData = await discordRes.json();

                // 2. Save to Supabase
                const { error } = await _supabase.from('orders').insert([
                    { name, item, note, discord_id: discordData.id }
                ]);

                if (error) throw error;

                status.innerText = "Order Received! 🌸";
                document.getElementById('custName').value = '';
                document.getElementById('custNote').value = '';
            } catch (e) {
                status.innerText = "Connection Failed: " + e.message;
            }
        }

        function showLogin() {
            const pin = prompt("Enter Staff PIN:");
            if(pin === '12344321-r') {
                document.getElementById('staffView').style.display = 'block';
                refreshOrders();
                setInterval(refreshOrders, 5000);
            }
        }

        async function refreshOrders() {
            const monitor = document.getElementById('orderMonitor');
            const { data, error } = await _supabase.from('orders').select('*').order('id', { ascending: false });
            
            if(error) return;
            if(!data || data.length === 0) {
                monitor.innerHTML = "<h3>Kitchen queue is empty.</h3>";
                return;
            }

            monitor.innerHTML = data.map(o => `
                <div class="order-card animate__animated animate__fadeInUp">
                    <div>
                        <h2 style="color:var(--primary)">${o.item}</h2>
                        <p style="opacity:0.6">${o.name}</p>
                        <p style="font-size:0.8rem; margin-top:5px;">${o.note || ''}</p>
                    </div>
                    <button class="done-btn" onclick="clearOrder(${o.id}, '${o.discord_id}')">MARK DONE</button>
                </div>
            `).join('');
        }

        async function clearOrder(id, dId) {
            // Delete Discord Message
            await fetch(`${WEBHOOK_URL}/messages/${dId}`, { method: 'DELETE' }).catch(() => {});
            // Delete from DB
            await _supabase.from('orders').delete().eq('id', id);
            refreshOrders();
        }
    </script>
</body>
</html>
