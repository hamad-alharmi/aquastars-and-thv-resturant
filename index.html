<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQUASTAR & THV | Luxury Indomie</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --p: #ff2d75; --p-g: rgba(255, 45, 117, 0.4);
            --bg: #050507; --s: rgba(255, 255, 255, 0.04);
            --b: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; overflow-x: hidden; }

        /* Animated Background Orbs */
        .orb { position: fixed; filter: blur(80px); z-index: -1; border-radius: 50%; opacity: 0.4; animation: move 20s infinite alternate; }
        .orb-1 { width: 400px; height: 400px; background: var(--p); top: -100px; left: -100px; }
        .orb-2 { width: 300px; height: 300px; background: #00d4ff; bottom: -50px; right: -50px; animation-delay: -5s; }
        @keyframes move { from { transform: translate(0,0); } to { transform: translate(100px, 100px); } }

        .container { max-width: 1200px; margin: 0 auto; padding: 60px 20px; }
        header { text-align: left; margin-bottom: 60px; display: flex; justify-content: space-between; align-items: flex-end; }
        header h1 { font-weight: 800; font-size: 3.5rem; letter-spacing: -3px; line-height: 0.9; }
        header h1 span { color: var(--p); text-shadow: 0 0 30px var(--p-g); }

        .layout { display: grid; grid-template-columns: 1fr 400px; gap: 40px; }

        /* Menu Grid */
        .glass { background: var(--s); backdrop-filter: blur(25px); border: 1px solid var(--b); border-radius: 35px; padding: 35px; }
        .cat-label { font-size: 0.7rem; font-weight: 800; color: var(--p); letter-spacing: 4px; text-transform: uppercase; margin: 30px 0 15px; display: block; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .item { 
            background: rgba(255,255,255,0.02); border: 1px solid var(--b); padding: 30px; border-radius: 25px; 
            cursor: pointer; transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1); text-align: center; position: relative;
        }
        .item:hover { background: var(--p); transform: translateY(-10px) scale(1.02); box-shadow: 0 20px 40px var(--p-g); border-color: transparent; }
        .item.active { border-color: var(--p); background: var(--p-g); }
        .item i { font-size: 2rem; margin-bottom: 15px; display: block; transition: 0.3s; }
        .item:hover i { transform: rotate(10deg); }

        /* Order Panel */
        input, textarea { 
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--b); 
            padding: 20px; border-radius: 20px; color: #fff; font-family: inherit; font-size: 1rem; margin-top: 10px;
        }
        input:focus { border-color: var(--p); box-shadow: 0 0 20px rgba(255, 45, 117, 0.2); }

        .btn { 
            width: 100%; background: #fff; color: #000; border: none; padding: 22px; 
            border-radius: 22px; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 25px;
        }
        .btn:hover { transform: scale(1.02); box-shadow: 0 10px 30px rgba(255,255,255,0.2); }
        .btn-p { background: var(--p); color: #fff; box-shadow: 0 15px 35px var(--p-g); }

        /* Staff Portal */
        #staff { position: fixed; inset: 0; background: #000; z-index: 999; display: none; padding: 60px; overflow-y: auto; }
        .stat-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 30px 0; }
        .stat-card { background: var(--s); padding: 30px; border-radius: 25px; border: 1px solid var(--b); text-align: center; }
        .stat-card h3 { font-size: 2.5rem; color: var(--p); }

        .order-card { 
            background: var(--s); border: 1px solid var(--b); padding: 30px; border-radius: 30px; 
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        
        .status-pill { padding: 6px 15px; border-radius: 50px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .status-pending { background: #ffaa00; color: #000; }
        .status-finished { background: #00ff88; color: #000; }

        .action-btns { display: flex; gap: 10px; }
        .a-btn { padding: 12px 20px; border-radius: 12px; border: none; cursor: pointer; font-weight: 700; transition: 0.2s; }
        .btn-finish { background: #00ff88; color: #000; }
        .btn-del { background: rgba(255,0,0,0.2); color: #ff4444; border: 1px solid #ff4444; }
    </style>
</head>
<body>
    <div class="orb orb-1"></div><div class="orb orb-2"></div>

    <div class="container">
        <header>
            <div>
                <p style="letter-spacing: 5px; opacity: 0.4;">RAS AL KHAIMAH • 2026</p>
                <h1>AQUA<span>STAR</span><br>& THV</h1>
            </div>
            <button class="btn" style="width: auto; margin: 0;" onclick="openStaff()"><i class="fa-solid fa-user-tie"></i></button>
        </header>

        <div class="layout">
            <div class="glass">
                <span class="cat-label">Pink Series 🌸</span>
                <div class="grid">
                    <div class="item" onclick="sel('Swicy', this)"><i class="fa-solid fa-pepper-hot"></i><strong>Swicy</strong></div>
                    <div class="item" onclick="sel('Duck Duck Indomie', this)"><i class="fa-solid fa-duck"></i><strong>Duck Duck</strong></div>
                    <div class="item" onclick="sel('Dreamy Creamy', this)"><i class="fa-solid fa-ice-cream"></i><strong>Creamy</strong></div>
                </div>
                <span class="cat-label">Nuclear Series ☢️</span>
                <div class="grid">
                    <div class="item" onclick="sel('Atomic Bomb', this)"><i class="fa-solid fa-bomb"></i><strong>Atomic</strong></div>
                    <div class="item" onclick="sel('Challenger', this)"><i class="fa-solid fa-skull-crossbones"></i><strong>Challenger</strong></div>
                </div>
                <span class="cat-label">Void Specials ⚫</span>
                <div class="grid">
                    <div class="item" onclick="sel('Duck Duck Black', this)"><i class="fa-solid fa-moon"></i><strong>Black</strong></div>
                    <div class="item" onclick="sel('The KAI', this)"><i class="fa-solid fa-star"></i><strong>KAI</strong></div>
                    <div class="item" onclick="sel('The ZANE', this)"><i class="fa-solid fa-bolt"></i><strong>ZANE</strong></div>
                </div>
            </div>

            <div class="glass" style="height: fit-content; position: sticky; top: 40px;">
                <h3 style="margin-bottom: 25px;">Checkout</h3>
                <label>Dish Selection</label>
                <input type="text" id="selDish" readonly placeholder="Select from menu...">
                <label>Your Name</label>
                <input type="text" id="name" placeholder="Who's eating?">
                <label>Notes</label>
                <textarea id="note" rows="4" placeholder="Extra spicy? No onions?"></textarea>
                <button class="btn btn-p" id="send" onclick="order()">PLACE ORDER</button>
            </div>
        </div>
    </div>

    <div id="staff">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1>Kitchen Management</h1>
            <button class="a-btn" onclick="document.getElementById('staff').style.display='none'">CLOSE</button>
        </div>
        <div class="stat-bar">
            <div class="stat-card"><p>Active</p><h3 id="c1">0</h3></div>
            <div class="stat-card"><p>Finished</p><h3 id="c2" style="color:#00ff88">0</h3></div>
            <div class="stat-card"><p>Total</p><h3 id="c3" style="color:#fff">0</h3></div>
        </div>
        <div id="staffList"></div>
    </div>

    <script>
        const S_URL = 'https://bfykhlcqukfhgpfdwywg.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmeWtobGNxdWtmaGdwZmR3eXdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NzIzMTgsImV4cCI6MjA5MzA0ODMxOH0.TWQjUNxTdXkHzYYuLoPJ2txzIDb8w_p_N2lX9qDf_JE';
        const W_URL = "https://discord.com/api/webhooks/1499047536986558497/FS_bssmM8WlvdV9GZanThEfQMC8NhfYF1wxH0Au17VeDb43RxYHPCPGFS0jcuO0iXfFZ";
        const _s = supabase.createClient(S_URL, S_KEY);
        let currentDish = "";

        function sel(d, e) {
            currentDish = d; document.getElementById('selDish').value = d;
            document.querySelectorAll('.item').forEach(i => i.classList.remove('active'));
            e.classList.add('active');
        }

        async function order() {
            const n = document.getElementById('name').value, nt = document.getElementById('note').value;
            if(!currentDish || !n) return alert("Missing info!");
            document.getElementById('send').innerText = "TRANSMITTING...";

            const res = await fetch(`${W_URL}?wait=true`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ embeds: [{ title: "New Order", color: 0xff2d75, fields: [{name:"User", value:n}, {name:"Dish", value:currentDish}] }] })
            });
            const d = await res.json();
            await _s.from('orders').insert([{ name:n, item:currentDish, note:nt, discord_id:d.id, status:'pending' }]);
            location.reload();
        }

        function openStaff() {
            if(prompt("PIN:") === '12344321-r') {
                document.getElementById('staff').style.display='block';
                loadStaff(); setInterval(loadStaff, 5000);
            }
        }

        async function loadStaff() {
            const { data } = await _s.from('orders').select('*').order('id', { ascending: false });
            if(!data) return;
            document.getElementById('c1').innerText = data.filter(o => o.status==='pending').length;
            document.getElementById('c2').innerText = data.filter(o => o.status==='finished').length;
            document.getElementById('c3').innerText = data.length;

            document.getElementById('staffList').innerHTML = data.map(o => `
                <div class="order-card">
                    <div>
                        <span class="status-pill status-${o.status}">${o.status}</span>
                        <h2 style="margin:10px 0;">${o.name} <small style="font-weight:300; opacity:0.5;">— ${o.item}</small></h2>
                        <p style="opacity:0.6;">${o.note || 'No notes'}</p>
                    </div>
                    <div class="action-btns">
                        ${o.status === 'pending' ? `<button class="a-btn btn-finish" onclick="upd(${o.id}, 'finished')">FINISH</button>` : ''}
                        <button class="a-btn btn-del" onclick="del(${o.id}, '${o.discord_id}')">DELETE</button>
                    </div>
                </div>
            `).join('');
        }

        async function upd(id, st) { await _s.from('orders').update({ status: st }).eq('id', id); loadStaff(); }
        async function del(id, did) {
            if(!confirm("Delete forever?")) return;
            await fetch(`${W_URL}/messages/${did}`, { method:'DELETE' }).catch(()=>{});
            await _s.from('orders').delete().eq('id', id);
            loadStaff();
        }
    </script>
</body>
</html>
