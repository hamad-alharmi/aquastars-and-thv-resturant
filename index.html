<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // 1. Connection Setup
    const SUPABASE_URL = 'https://bfykhlcqukfhgpfdwywg.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmeWtobGNxdWtmaGdwZmR3eXdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NzIzMTgsImV4cCI6MjA5MzA0ODMxOH0.TWQjUNxTdXkHzYYuLoPJ2txzIDb8w_p_N2lX9qDf_JE';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const WEBHOOK_URL = "https://discord.com/api/webhooks/1499047536986558497/FS_bssmM8WlvdV9GZanThEfQMC8NhfYF1wxH0Au17VeDb43RxYHPCPGFS0jcuO0iXfFZ";

    window.onload = () => setTimeout(() => document.getElementById('loader').style.display = 'none', 800);
    function setTheme(t) { document.documentElement.setAttribute('data-theme', t); }
    ScrollReveal().reveal('.reveal', { distance: '20px', origin: 'bottom', duration: 800 });

    // 2. Send Order
    async function sendOrder() {
        const name = document.getElementById('custName').value;
        const item = document.getElementById('dishSelect').value;
        const note = document.getElementById('custNote').value;
        const status = document.getElementById('status');

        if(!name || !item) return alert("Please enter your name and dish.");
        status.innerText = "Processing order...";

        try {
            // Step A: Send to Discord
            const discordRes = await fetch(`${WEBHOOK_URL}?wait=true`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    embeds: [{
                        title: "New Order Received",
                        color: 0xff2d75,
                        fields: [
                            { name: "Customer", value: name, inline: true },
                            { name: "Dish", value: item, inline: true },
                            { name: "Note", value: note || "None" }
                        ],
                        timestamp: new Date()
                    }]
                })
            });
            const discordData = await discordRes.json();

            // Step B: Save to Supabase (Table name must be 'orders')
            const { error } = await _supabase
                .from('orders')
                .insert([{ name, item, note, discord_id: discordData.id }]);

            if (error) throw error;

            status.innerText = "Order sent to kitchen!";
            document.getElementById('custName').value = '';
            document.getElementById('custNote').value = '';
            if(document.getElementById('staffDashboard').style.display === 'block') refreshOrders();
        } catch (e) {
            status.innerText = "Error: " + e.message;
            console.error(e);
        }
    }

    // 3. Staff Portal Logic
    function login() {
        if(document.getElementById('staffPass').value === '12344321-r') {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('staffDashboard').style.display = 'block';
            refreshOrders();
            setInterval(refreshOrders, 5000); // Auto-refresh every 5s
        } else {
            alert("Incorrect password.");
        }
    }

    async function refreshOrders() {
        const monitor = document.getElementById('orderMonitor');
        const { data, error } = await _supabase
            .from('orders')
            .select('*')
            .order('id', { ascending: false });

        if(error) {
            monitor.innerHTML = `<p style="color:red;">Sync Error: ${error.message}</p>`;
            return;
        }

        if(!data || data.length === 0) {
            monitor.innerHTML = "<p style='opacity:0.5;'>Kitchen is empty.</p>";
            return;
        }

        monitor.innerHTML = data.map(o => `
            <div class="order-item">
                <div>
                    <strong>${o.item}</strong><br>
                    <small>${o.name} ${o.note ? `(${o.note})` : ''}</small>
                </div>
                <button class="btn-main" style="width:auto; padding:5px 15px; background:#333;" onclick="cancelOrder(${o.id}, '${o.discord_id}')">DONE</button>
            </div>
        `).join('');
    }

    async function cancelOrder(id, dId) {
        if(!confirm("Clear this order?")) return;
        
        // Remove from Discord
        await fetch(`${WEBHOOK_URL}/messages/${dId}`, { method: 'DELETE' }).catch(() => {});
        
        // Remove from Supabase
        await _supabase.from('orders').delete().eq('id', id);
        refreshOrders();
    }
</script>
